name: Social Media Card Generator

on:
  push:
    branches: [main]
    paths: ['index.html', 'README.md']
  workflow_dispatch:

jobs:
  generate-og-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install -g @vercel/og-image-react-emoji sharp

      - name: Create OG image script
        run: |
          cat > generate-og.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          // Read the HTML file to extract metadata
          const htmlPath = path.join(__dirname, 'index.html');
          const html = fs.readFileSync(htmlPath, 'utf-8');

          // Extract name from HTML
          const nameMatch = html.match(/<h1 class="name">([^<]+)<\/h1>/);
          const name = nameMatch ? nameMatch[1] : 'Michael Josias D. Tabada';

          // Extract title from HTML
          const titleMatch = html.match(/<p class="title">([^<]+)<\/p>/);
          const title = titleMatch ? titleMatch[1].replace(/<[^>]*>/g, '') : 'Platform Engineer';

          console.log('Generating OG Image for:', name);
          console.log('Title:', title);

          // Create SVG OG Image
          const svgContent = `<?xml version="1.0" encoding="UTF-8"?>
          <svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
              </linearGradient>
              <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>
            
            <!-- Background -->
            <rect width="1200" height="630" fill="url(#grad2)"/>
            
            <!-- Decorative circles -->
            <circle cx="100" cy="100" r="80" fill="#6366f1" opacity="0.1"/>
            <circle cx="1100" cy="530" r="120" fill="#ec4899" opacity="0.1"/>
            <circle cx="600" cy="315" r="200" fill="#6366f1" opacity="0.05"/>
            
            <!-- Border gradient -->
            <rect x="20" y="20" width="1160" height="590" fill="none" stroke="url(#grad1)" stroke-width="4" rx="20"/>
            
            <!-- Name -->
            <text x="60" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" filter="url(#glow)">
              ${name}
            </text>
            
            <!-- Title -->
            <text x="60" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8">
              ${title}
            </text>
            
            <!-- Footer -->
            <text x="60" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6366f1">
              🚀 Platform Engineer | Cloud Architect | AI
            </text>
            
            <!-- GitHub handle -->
            <text x="60" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#ec4899">
              github.com/mysycry
            </text>
            
            <!-- Decorative elements -->
            <circle cx="1050" cy="80" r="10" fill="#6366f1" opacity="0.6"/>
            <circle cx="1080" cy="60" r="6" fill="#ec4899" opacity="0.8"/>
            <circle cx="1030" cy="100" r="8" fill="#06b6d4" opacity="0.7"/>
          </svg>`;

          fs.writeFileSync('og-image.svg', svgContent);
          console.log('✅ OG Image generated: og-image.svg');
          EOF

      - name: Generate OG Image
        run: node generate-og.js

      - name: Upload OG Image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: og-image
          path: og-image.svg
          retention-days: 30

      - name: Commit and push OG Image
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add og-image.svg || true
          git diff --staged --quiet || git commit -m "chore: auto-generate social media card [skip ci]"
          git push || true

      - name: Create summary
        run: |
          echo "## 🎴 Social Media Card Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Open Graph image has been generated and committed to the repository." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage" >> $GITHUB_STEP_SUMMARY
          echo 'Add this to your HTML `<head>`:' >> $GITHUB_STEP_SUMMARY
          echo '```html' >> $GITHUB_STEP_SUMMARY
          echo '<meta property="og:image" content="https://raw.githubusercontent.com/mysycry/josiasmichael.github.io/main/og-image.svg">' >> $GITHUB_STEP_SUMMARY
          echo '<meta name="twitter:image" content="https://raw.githubusercontent.com/mysycry/josiasmichael.github.io/main/og-image.svg">' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
